<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#07080C" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HydroScan" />
    <meta name="description" content="Drinking-water quality intelligence by Prudence EHS. Field assessment, lab compliance screening, causal analysis, and defensible reports." />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon-192.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>HydroScan — by Prudence EHS</title>
    <style>
      html,body{
        margin:0;
        background:#07080C;
        /* Lock the mobile viewport: no rubber-band bounce, no horizontal
           overflow, no double-tap zoom. With maximum-scale=1 above and the
           16px input-font rule below, the page only scrolls vertically. */
        overscroll-behavior:none;
        overflow-x:hidden;
        touch-action:pan-y;
        -webkit-text-size-adjust:100%;
        text-size-adjust:100%;
      }
      /* iOS Safari auto-zooms when a focused input's font-size is under
         16px. Floor every form control at 16px so focusing a field doesn't
         yank the viewport. */
      input,select,textarea{font-size:16px;}
      /* Fabrica — used for the HydroScan AI (Marlow) chat surface only.
         Commercial font: drop the licensed web files into public/fonts/
         (fabrica.woff2 + fabrica.woff) and they load automatically. Until
         the files exist the browser falls back to the Inter stack in
         --font-marlow, so the chat never renders blank. */
      @font-face{
        font-family:'Fabrica';
        src:url('/fonts/fabrica.woff2') format('woff2'),
            url('/fonts/fabrica.woff') format('woff');
        font-weight:100 900;
        font-style:normal;
        font-display:swap;
      }
      /* Inter-anchored system stack. Inter is loaded below; system
         fallbacks (SF Pro, Segoe UI, Roboto) keep the app native if Inter
         fails to load. cv11 flips Inter to its single-storey 'a'. */
      :root{
        --font-sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI Variable','Segoe UI',system-ui,ui-sans-serif,'Helvetica Neue',Arial,sans-serif,'Apple Color Emoji','Segoe UI Emoji';
        --font-mono:var(--font-sans);
        /* Fabrica drives the HydroScan AI (Marlow) chat surface; Inter is
           the fallback until the licensed files land in public/fonts/. */
        --font-marlow:'Fabrica',var(--font-sans);
        /* Bold display serif for hero/tour copy — Fraunces, a high-contrast
           "old style" serif that carries weight at large sizes. */
        --font-serif:'Fraunces',Georgia,'Times New Roman',serif;

        /* Theme palette — LIGHT is the default (toggle to dark in Settings).
           Brand hue is leaf green #77B258: the vivid fill (--accent-fill)
           paints the hero CTA, the HydroScan-AI brain, and glowing outlines;
           --accent is an auto-darkened green so small text/icons stay legible
           on the near-white page. Components reference var(--*) rather than
           hex so the whole app flips with the [data-theme="dark"] block. */
        --bg:#FAFAFB;
        --surface:#F4F5F7;
        --card:#FFFFFF;
        --raised:#EAF3E4;
        --border:#D9E2EC;
        --accent:#4C7A2F;          /* readable deep green — text, icons, borders */
        --accent-dim:#3C6225;
        --accent-fill:#77B258;     /* vivid brand green — filled CTAs, brain, glow */
        --on-accent:#FFFFFF;       /* ink on a solid --accent fill */
        --on-accent-fill:#0A1F07;  /* ink on the vivid green fill */
        --cta1:#3F7A2E;            /* deep-green CTA gradient (white inscription) */
        --cta2:#4C8A37;
        --text:#0F172A;
        --sub:#475569;
        --dim:#5B6675;
        --warn:#9A4A08;
        --danger:#B91C1C;
        --success:#15703A;
        --success-deep:#0F5A2E;
        --sev-high:#C2410C;        /* short-term / high-severity orange */
        --accent2:#6D28D9;         /* lab / Legionella violet */
        --accent2-deep:#5B21B6;
        /* Component tokens — surfaces/text/borders for the legacy screens
           (field walkthrough, lab entry, COC, modals) authored against fixed
           dark hexes. Light values here; dark mirrors the original hexes
           below so dark mode is unchanged. */
        --c-card:#FFFFFF;
        --c-surface:#EEF1F5;
        --c-border:#DCE3EB;
        --c-border2:#C3CDD9;
        --c-text:#0F172A;
        --c-text2:#334155;
        --c-sub:#5B6675;
        --c-dim:#8A94A3;
        --c-faint:#AEB8C4;
        --header-bg:rgba(255,255,255,0.88);
        --scrim-full:rgba(247,248,250,0.96);
      }
      [data-theme="dark"]{
        /* Dark palette — same green brand, brighter --accent for legibility
           on near-black. Component tokens equal the original hardcoded hexes
           so the dark UI renders exactly as it did before light mode landed. */
        --bg:#07080C;
        --surface:#0D0E14;
        --card:#111318;
        --raised:#161922;
        --border:#1C1E26;
        --accent:#86C166;          /* bright green — text/icons on dark */
        --accent-dim:#5E9E3F;
        --accent-fill:#77B258;     /* vivid brand green (same as light) */
        --on-accent:#06140B;
        --on-accent-fill:#06140B;
        --cta1:#3F7A2E;
        --cta2:#4C8A37;
        --text:#ECEEF2;
        --sub:#8B93A5;
        --dim:#6B7380;
        --warn:#FBBF24;
        --danger:#EF4444;
        --success:#22C55E;
        --success-deep:#16A34A;
        --sev-high:#FB923C;
        --accent2:#8B5CF6;
        --accent2-deep:#6D28D9;
        --c-card:#0C1017;
        --c-surface:#12161D;
        --c-border:#1A2030;
        --c-border2:#2A3040;
        --c-text:#F0F4F8;
        --c-text2:#C8D0DC;
        --c-sub:#8B95A8;
        --c-dim:#5E6578;
        --c-faint:#3A4050;
        --header-bg:rgba(8,10,14,0.87);
        --scrim-full:rgba(8,10,14,0.96);
      }
      body{
        font-family:var(--font-sans);
        /* cv11 = single-storey 'a', ss03 = higher-contrast curves, tnum =
           tabular numerals (set globally because HydroScan is a lab-readout
           product — every value, MCL, and date benefits from alignment). */
        font-feature-settings:'cv11','ss03','tnum';
        -webkit-font-smoothing:antialiased;
        -moz-osx-font-smoothing:grayscale;
        text-rendering:optimizeLegibility;
      }
      /* Header wordmark theme swap: light is the default, so show the
         black-text wordmark by default and the white-text variant only
         under [data-theme="dark"]. */
      .hs-wordmark-dark{display:none!important;}
      .hs-wordmark-light{display:block!important;}
      [data-theme="dark"] .hs-wordmark-dark{display:block!important;}
      [data-theme="dark"] .hs-wordmark-light{display:none!important;}
    </style>
    <script>
      /* Apply the saved theme before first paint so there's no flash of the
         wrong palette. Mirrors the storage wrapper's key/JSON encoding
         (localStorage 'hydroscan:hydroscan-theme'); defaults to light. */
      (function(){try{var t=localStorage.getItem('hydroscan:hydroscan-theme');var m=t?JSON.parse(t):'light';document.documentElement.setAttribute('data-theme',m==='dark'?'dark':'light');}catch(e){document.documentElement.setAttribute('data-theme','light');}})();
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Single:wght@400;700&family=Inter:wght@300;400;500;600;700;800;900&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
