<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <rect width="192" height="192" rx="42" fill="#0A0A10"/>
  <!-- Magnifying glass — matches in-app Logo: circle with doc lines, check, handle -->
  <circle cx="78" cy="70" r="30" fill="none" stroke="#34C759" stroke-width="3.5"/>
  <!-- Document lines inside lens -->
  <line x1="62" y1="60" x2="84" y2="60" stroke="#34C759" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="62" y1="70" x2="90" y2="70" stroke="#34C759" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="62" y1="80" x2="80" y2="80" stroke="#34C759" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
  <!-- Checkmark -->
  <polyline points="86,68 89,72 96,62" fill="none" stroke="#34C759" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Handle -->
  <line x1="100" y1="92" x2="124" y2="116" stroke="#34C759" stroke-width="5" stroke-linecap="round"/>
  <!-- Brand text -->
  <text x="32" y="160" font-family="system-ui, sans-serif" font-weight="700" font-size="34" fill="#E2E8F0">Reg</text>
  <text x="98" y="160" font-family="system-ui, sans-serif" font-weight="700" font-size="34" fill="#34C759">Lens</text>
</svg>
