<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <rect width="192" height="192" rx="40" fill="#0A0A10"/>
  <!-- Magnifying glass with green lens -->
  <circle cx="80" cy="72" r="28" fill="#16a34a" fill-opacity="0.12"/>
  <circle cx="80" cy="72" r="28" fill="none" stroke="#16a34a" stroke-width="4"/>
  <line x1="100" y1="92" x2="120" y2="112" stroke="#16a34a" stroke-width="5" stroke-linecap="round"/>
  <!-- Check mark inside lens -->
  <polyline points="68,72 76,80 92,64" fill="none" stroke="#16a34a" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Reg -->
  <text x="30" y="152" font-family="system-ui, sans-serif" font-weight="800" font-size="38" fill="#F0F4F8" letter-spacing="-1">Reg</text>
  <!-- Lens in green -->
  <text x="103" y="152" font-family="system-ui, sans-serif" font-weight="800" font-size="38" fill="#16a34a" letter-spacing="-1">Lens</text>
</svg>
