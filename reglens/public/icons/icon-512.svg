<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="108" fill="#0A0A10"/>
  <!-- Magnifying glass with green lens -->
  <circle cx="215" cy="190" r="75" fill="#16a34a" fill-opacity="0.12"/>
  <circle cx="215" cy="190" r="75" fill="none" stroke="#16a34a" stroke-width="10"/>
  <line x1="268" y1="243" x2="320" y2="295" stroke="#16a34a" stroke-width="13" stroke-linecap="round"/>
  <!-- Check mark inside lens -->
  <polyline points="183,190 203,210 247,166" fill="none" stroke="#16a34a" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Reg -->
  <text x="78" y="405" font-family="system-ui, sans-serif" font-weight="800" font-size="102" fill="#F0F4F8" letter-spacing="-3">Reg</text>
  <!-- Lens in green -->
  <text x="275" y="405" font-family="system-ui, sans-serif" font-weight="800" font-size="102" fill="#16a34a" letter-spacing="-3">Lens</text>
</svg>
