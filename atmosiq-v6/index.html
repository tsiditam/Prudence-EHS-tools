<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#050507" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AtmosFlow" />
    <meta name="description" content="Field-grade IAQ assessment platform by Prudence EHS. Real-time scoring, causal analysis, and defensible reports." />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>AtmosFlow — by Prudence EHS</title>
    <style>
      html,body{margin:0;background:#050507;}
      /* Notion-style system stack with Inter as the cross-platform anchor.
         Inter is loaded below; the system fallbacks (SF Pro on iOS/Mac,
         Segoe UI on Windows, Roboto on Android) keep the app feeling
         native if Inter ever fails to load. font-feature-settings 'cv11'
         flips Inter to its single-storey 'a' which is the look the rest
         of the design language is calibrated to. */
      :root{
        --font-sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI Variable','Segoe UI',system-ui,ui-sans-serif,'Helvetica Neue',Arial,sans-serif,'Apple Color Emoji','Segoe UI Emoji';
        --font-mono:ui-monospace,'SF Mono',Menlo,Monaco,'Cascadia Code','Roboto Mono',Consolas,monospace;
      }
      body{
        font-family:var(--font-sans);
        font-feature-settings:'cv11','ss03';
        -webkit-font-smoothing:antialiased;
        -moz-osx-font-smoothing:grayscale;
        text-rendering:optimizeLegibility;
      }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
