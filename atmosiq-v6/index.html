<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#050507" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AtmosFlow" />
    <meta name="description" content="Field-grade IAQ assessment platform by Prudence EHS. Real-time scoring, causal analysis, and defensible reports." />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>AtmosFlow — by Prudence EHS</title>
    <style>
      html,body{margin:0;background:#050507;}
      /* Notion-style system stack with Inter as the cross-platform anchor.
         Inter is loaded below; the system fallbacks (SF Pro on iOS/Mac,
         Segoe UI on Windows, Roboto on Android) keep the app feeling
         native if Inter ever fails to load. font-feature-settings 'cv11'
         flips Inter to its single-storey 'a' which is the look the rest
         of the design language is calibrated to. */
      :root{
        --font-sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI Variable','Segoe UI',system-ui,ui-sans-serif,'Helvetica Neue',Arial,sans-serif,'Apple Color Emoji','Segoe UI Emoji';
        --font-mono:ui-monospace,'SF Mono',Menlo,Monaco,'Cascadia Code','Roboto Mono',Consolas,monospace;

        /* Theme palette — dark is the default. Values match the in-app
           MobileApp.jsx constants so unmigrated components render
           identically. Components opt into theming by referencing
           var(--bg) etc. instead of inline hex literals. Light mode is
           an opt-in override under [data-theme="light"] below. */
        --bg:#07080C;
        --surface:#0D0E14;
        --card:#111318;
        --border:#1C1E26;
        --accent:#22D3EE;
        --accent-dim:#1A8FA0;
        --text:#ECEEF2;
        --sub:#8B93A5;
        --dim:#6B7380;
        --warn:#FBBF24;
        --danger:#EF4444;
        --success:#22C55E;
        /* Foreground used on top of --accent (filled accent buttons). */
        --on-accent:#07080C;
      }
      [data-theme="light"]{
        /* Cyan-and-white retune (PR follow-up to the original
           neutral light palette). Page reads as cyan-tinted white
           rather than slate gray; card outlines pick up a soft cyan
           tint so the brand pulls through the chrome, not just the
           filled accent buttons. Cards stay pure white so content
           always has the cleanest read. Body text stops are kept
           untouched — all text pairings still clear AA 4.5:1. */
        --bg:#F0FAFC;
        --surface:#DAF2F8;
        --card:#FFFFFF;
        --border:#B6E0E8;
        --accent:#0E7490;
        --accent-dim:#155E75;
        --text:#0F172A;
        --sub:#475569;
        --dim:#5B6675;
        --on-accent:#FFFFFF;
        /* Semantic colors diverge in light mode: the vivid dark-mode
           shades wash out on white (warn #FBBF24 → 1.57:1, success
           #22C55E → 2.14:1). Light mode uses darker stops from the
           same hue families so they remain legible as foreground
           text. Severity-badge helpers in component code still use
           the literal dark-mode hexes for semantic consistency. */
        --warn:#9A4A08;
        --danger:#B91C1C;
        --success:#15703A;
      }
      body{
        font-family:var(--font-sans);
        font-feature-settings:'cv11','ss03';
        -webkit-font-smoothing:antialiased;
        -moz-osx-font-smoothing:grayscale;
        text-rendering:optimizeLegibility;
      }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
