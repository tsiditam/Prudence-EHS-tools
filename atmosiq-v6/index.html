<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#050507" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AtmosFlow" />
    <meta name="description" content="Field-grade IAQ assessment platform by Prudence EHS. Real-time scoring, causal analysis, and defensible reports." />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon-192.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>AtmosFlow — by Prudence EHS</title>
    <style>
      html,body{
        margin:0;
        background:#050507;
        /* Lock the mobile viewport: no rubber-band bounce when the
           user scrolls past the top/bottom edge, no horizontal
           overflow that lets the page slide sideways, and no
           double-tap zoom. Combined with the maximum-scale=1
           viewport meta above and the 16px input font rule below,
           the page never "expands" on phone — it only scrolls
           vertically within its own content. */
        overscroll-behavior:none;
        overflow-x:hidden;
        touch-action:pan-y;
        -webkit-text-size-adjust:100%;
        text-size-adjust:100%;
      }
      /* iOS Safari auto-zooms when the focused input's font-size is
         under 16px. Floor every form control at 16px so focusing a
         field doesn't yank the viewport. Visual size of inline
         numeric inputs is preserved via component-level transforms
         where needed. */
      input,select,textarea{font-size:16px;}
      /* Fabrica — used for the AtmosFlow AI (Jasper) chat surface only.
         Commercial font: drop the licensed web files into
         public/fonts/ (fabrica.woff2 + fabrica.woff) and they load
         automatically. Until the files exist the browser silently
         falls back to the Inter stack in --font-jasper, so the chat
         never renders blank. font-display:swap avoids a blocking FOIT. */
      @font-face{
        font-family:'Fabrica';
        src:url('/fonts/fabrica.woff2') format('woff2'),
            url('/fonts/fabrica.woff') format('woff');
        font-weight:100 900;
        font-style:normal;
        font-display:swap;
      }
      /* Notion-style system stack with Inter as the cross-platform anchor.
         Inter is loaded below; the system fallbacks (SF Pro on iOS/Mac,
         Segoe UI on Windows, Roboto on Android) keep the app feeling
         native if Inter ever fails to load. font-feature-settings 'cv11'
         flips Inter to its single-storey 'a' which is the look the rest
         of the design language is calibrated to. */
      :root{
        --font-sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI Variable','Segoe UI',system-ui,ui-sans-serif,'Helvetica Neue',Arial,sans-serif,'Apple Color Emoji','Segoe UI Emoji';
        /* --font-mono is now an alias for --font-sans. The v3 design
           pass moved away from a separate mono family — the system
           mono stack (SF Mono / Cascadia / Roboto Mono) was reading
           as "default code editor font" on a premium product. The
           variable name is retained for the ~70 inline call sites
           still spelling fontFamily:'var(--font-mono)'; rendering is
           Inter with tabular numerals inherited from the body rule
           below, so columns of stat values and dates still align.
           Future cleanup can migrate the call sites to var(--font-sans)
           and delete this alias. */
        --font-mono:var(--font-sans);
        /* Fabrica drives the AtmosFlow AI (Jasper) chat surface; Inter
           stack is the fallback until the licensed font files land in
           public/fonts/ (see the @font-face above). */
        --font-jasper:'Fabrica',var(--font-sans);

        /* Theme palette — dark is the default. Values match the in-app
           MobileApp.jsx constants so unmigrated components render
           identically. Components opt into theming by referencing
           var(--bg) etc. instead of inline hex literals. Light mode is
           an opt-in override under [data-theme="light"] below. */
        --bg:#07080C;
        --surface:#0D0E14;
        --card:#111318;
        --raised:#161922;
        --border:#1C1E26;
        /* Restrained primary cyan — darker and a touch less saturated
           than the old #22D3EE aqua, so header controls, icon outlines,
           text accents, and default active states read technical and
           premium rather than consumer-bright. The brighter --accent-fill
           below is reserved for filled-CTA / active emphasis. */
        --accent:#2EA7BF;
        --accent-dim:#1A8FA0;
        --text:#ECEEF2;
        --sub:#8B93A5;
        --dim:#6B7380;
        --warn:#FBBF24;
        --danger:#EF4444;
        --success:#22C55E;
        /* Foreground used on top of --accent (filled accent buttons). */
        --on-accent:#07080C;
        /* Brighter cyan reserved for emphasis — filled primary CTAs and
           active/selected highlights. Toned down from the old #22D3EE
           aqua but kept a step brighter than --accent so filled buttons
           still pop. The fill itself is invariant across modes; the
           paired foreground --on-accent-fill diverges: WHITE in dark
           mode (per product direction — the inscription on the cyan CTA
           reads white on dark surfaces) and dark in light mode below.
           Note: white on #39C0D9 is ~1.9:1, under WCAG AA — accepted
           intentionally for the dark-mode look; flag for any a11y audit. */
        --accent-fill:#39C0D9;
        --on-accent-fill:#FFFFFF;
      }
      [data-theme="light"]{
        /* Premium Light palette — a neutral cool-grey (slate) page,
           tuned from the v3 prototype's "Clinical Light" theme but with
           the blue pulled out for a calmer, less-tinted read (not the
           prior warm off-white). Three-step surface ladder so hierarchy
           reads in light mode the same way it does in dark: bg is the
           slate tint, surface a tier lower, card stays pure white so
           cards lift off the page. Borders are neutral cool-grey to keep
           card edges clean; the restrained cyan (#2EA7BF) is reserved for
           text, icons, and active states, and the brighter #39C0D9 fills
           emphasis CTAs. NOTE: the darker accent on near-white is
           ~2.6:1, below WCAG AA 4.5:1 for body text — accepted
           intentionally for brand consistency; flag for any future
           accessibility audit. */
        --bg:#EEF1F4;
        --surface:#E4E8EC;
        --card:#FFFFFF;
        /* Light-mode raised surface for "selected" / "focused" rows.
           A pale cyan tint (the brand's light tint) so selected/active
           rows read as an accent highlight against pure-white cards,
           rather than the previous neutral off-white. Subtle enough to
           stay a background, not a fill. */
        --raised:#DDF7FB;
        /* Neutral cool-grey card edge (was a cyan-tinted #B6E0E8). The
           v3 Clinical-Light mockups use a clean near-neutral border so
           white cards read crisp against the cool page rather than
           cyan-outlined. Cyan still carries active/selected states via
           --accent and the pale --raised tint. */
        --border:#D6DBE1;
        --accent:#2EA7BF;
        --accent-dim:#155E75;
        --text:#0F172A;
        --sub:#475569;
        --dim:#5B6675;
        --on-accent:#07080C;
        /* --accent-fill (emphasis cyan) is invariant. --on-accent-fill
           stays DARK in light mode — black text on the cyan CTA is the
           correct, high-contrast pairing against a near-white page
           (dark mode flips it to white above). */
        --accent-fill:#39C0D9;
        --on-accent-fill:#07080C;
        /* Semantic colors diverge in light mode: the vivid dark-mode
           shades wash out on white (warn #FBBF24 → 1.57:1, success
           #22C55E → 2.14:1). Light mode uses darker stops from the
           same hue families so they remain legible as foreground
           text. Severity-badge helpers in component code still use
           the literal dark-mode hexes for semantic consistency. */
        --warn:#9A4A08;
        --danger:#B91C1C;
        --success:#15703A;
      }
      body{
        font-family:var(--font-sans);
        /* OpenType features: cv11 = single-storey 'a' (Inter), ss03 =
           higher-contrast curves, tnum = tabular (column-aligned)
           numerals. tnum is set globally because AtmosFlow is an
           instrument-readout product — every stat strip, score, date,
           and measurement readout benefits from tabular alignment, and
           Inter's proportional vs tabular numerals are close enough
           visually that narrative copy still reads well. font-feature-
           settings inherits in CSS, so every descendant picks this up
           without needing inline declarations. */
        font-feature-settings:'cv11','ss03','tnum';
        -webkit-font-smoothing:antialiased;
        -moz-osx-font-smoothing:grayscale;
        text-rendering:optimizeLegibility;
      }
      /* Header wordmark theme swap: the default (dark-theme) wordmark has
         white text, which is invisible on the light header. Show the
         black-text variant under [data-theme="light"]. The brain mark is
         cyan in both files, so it never disappears. !important overrides
         the inline display set on each <img>. */
      [data-theme="light"] .af-wordmark-dark{display:none!important;}
      [data-theme="light"] .af-wordmark-light{display:block!important;}
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Single:wght@400;700&family=Inter:wght@300;400;500;600;700;800;900&family=Lora:wght@400;500;600;700&family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
